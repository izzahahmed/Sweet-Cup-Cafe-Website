<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> sweet cup reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
        <div class="d-flex justify-content-between align-items-center">
        <div class="logo">
    <h1>SWEET CUP CAFE</h1>
    </div>
    <nav>
        <a href="index.html">Home</a> 
        <a href="menu.html">Menu</a> 
        <a href="reservation.html">Reservation</a> 
        <a href="contact.html">Contact</a>
    </nav>
    </div>
    </div>
    </header>
    <section class="container">

    <h1 id="reservation-heading" class="text-center">
        RESERVATION
    </h1>

    <p class="text-center">
        Book your table and enjoy your time with us!
    </p>

    <form action="/reservation.html" method="post">

        <div class="row">

            <div class="col-lg-6">

                <label for="username">Username</label><br>
                <input type="text" name="username">

            </div>

            <div class="col-lg-6">

                <label for="email">Email Address</label><br>
                <input type="email" name="email">

            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-lg-6">

                <label for="phoneno">Phone Number</label><br>
                <input type="tel" name="phoneno">

            </div>

            <div class="col-lg-6">

                <label for="guests">Number of Guests</label><br>
                <input type="number" name="guests">

            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-lg-12">

                <label for="time">Date and Time</label><br>
                <input type="datetime-local" name="time">

            </div>

        </div>

        <br>

        <div class="text-center">

            <input type="submit" value="Reserve Table">

        </div>

    </form>

</section>
     <footer>
        <div class="container">
<div class="d-flex justify-content-between align-items-center">
        <div class="footer-text">
    <p>☕ Thank you for visiting Sweet Cup Cafe!</p>

    <p>Made with love, served with joy.</p>

    <p>Open Daily: 9:00 AM - 10:00 PM</p>

    <p> 2026 Sweet Cup Cafe. All Rights Reserved.</p>
    </div>
    <div class="footer-img">
        <img src="footer cup.png" alt="footer cup logo">
    </div>
    </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
